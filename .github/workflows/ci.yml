name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write # Codecov OIDC (tokenless upload)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck / Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # pnpm must be set up before setup-node so `cache: pnpm` can find it.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test:coverage

      # Coverage + test analytics via Codecov, authenticated with OIDC — no
      # CODECOV_TOKEN secret needed. Non-blocking (fail_ci_if_error: false) so a
      # Codecov hiccup never fails the required check. Test results upload even
      # on test failure (!cancelled) so flaky/failing tests are reported.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          report_type: coverage
          use_oidc: true
          fail_ci_if_error: false

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/junit.xml
          report_type: test_results
          use_oidc: true
          fail_ci_if_error: false

      # Build to confirm the bundle compiles. dist/ is NOT committed (it is
      # produced at release time and committed onto the tag), so there is no
      # freshness check here.
      - run: pnpm run build
