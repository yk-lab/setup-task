name: Self-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter needs PR base/head on pull_request events

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether non-markdown files changed so the heavy matrix jobs can be
  # skipped for documentation-only PRs while still reporting a green status.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            src:
              - '**/*'
              - '!**/*.md'
              - '!*.md' # `!**/*.md` doesn't match root-level files (e.g. README.md)
              - '!.github/workflows/docs.yml'

  matrix:
    name: ${{ matrix.os }} / version=${{ matrix.version }}
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        version: ["latest", "3.x", "3.51.1"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The action runs from dist/, so build it first in CI.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run setup-task (first install — expect cache miss)
        id: setup
        uses: ./
        with:
          version: ${{ matrix.version }}

      - name: Verify install and cache miss on first run
        shell: bash
        run: |
          installed="$(task --version)"
          echo "task --version => ${installed}"
          echo "resolved => ${RESOLVED} / cache-hit => ${CACHE_HIT}"
          case "${installed}" in
            *"${RESOLVED}"*) echo "OK: versions match" ;;
            *) echo "::error::version mismatch: '${installed}' does not contain '${RESOLVED}'"; exit 1 ;;
          esac
          if [ "${CACHE_HIT}" != "false" ]; then
            echo "::error::expected cache-hit=false on the first install, got '${CACHE_HIT}'"; exit 1
          fi
        env:
          RESOLVED: ${{ steps.setup.outputs.version }}
          CACHE_HIT: ${{ steps.setup.outputs.cache-hit }}

      # Re-run in the same job: the tool cache persists on this runner, so the
      # second install must be a cache hit (download + checksum skipped). This
      # verifies the cache-hit path.
      - name: Run setup-task again (expect cache hit)
        id: setup2
        uses: ./
        with:
          version: ${{ matrix.version }}

      - name: Verify cache hit on second run
        shell: bash
        run: |
          echo "resolved => ${RESOLVED} / cache-hit => ${CACHE_HIT}"
          if [ "${CACHE_HIT}" != "true" ]; then
            echo "::error::expected cache-hit=true on the second install, got '${CACHE_HIT}'"; exit 1
          fi
          if [ "${RESOLVED}" != "${FIRST}" ]; then
            echo "::error::resolved version changed between runs: '${FIRST}' -> '${RESOLVED}'"; exit 1
          fi
          echo "OK: second install was served from the tool cache"
        env:
          RESOLVED: ${{ steps.setup2.outputs.version }}
          CACHE_HIT: ${{ steps.setup2.outputs.cache-hit }}
          FIRST: ${{ steps.setup.outputs.version }}

  skip-checksum:
    name: Install with skip-checksum
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # skip-checksum bypasses SHA256 verification and must still install.
      # (Checksum verification with mismatch detection is covered by the matrix
      # job above — which installs with verification on — and by the tamper
      # tests in tests/checksum.test.ts, run by the CI test job.)
      - name: Install with checksum skipped
        uses: ./
        with:
          version: "3.51.1"
          skip-checksum: "true"
      - run: task --version

  # Install with all traffic forced through an HTTP proxy, proving the action's
  # fetch (proxy-unaware by default) is routed via the proxy env (#54).
  proxy:
    name: Install behind an HTTP proxy
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Start a local HTTP proxy (tinyproxy)
        run: |
          sudo apt-get update
          sudo apt-get install -y tinyproxy
          # apt may auto-start a tinyproxy service on :8888 (default config,
          # logging to /var/log). Stop it so our instance owns the port and logs
          # where we can read it.
          sudo systemctl stop tinyproxy 2>/dev/null || sudo service tinyproxy stop 2>/dev/null || true
          puser="$(id -un)"; pgroup="$(id -gn)"
          {
            echo "Port 8888"
            echo "Listen 127.0.0.1"
            echo "Timeout 600"
            echo "Allow 127.0.0.1"
            # Stay as the runner user so the log/pid files are writable (avoid the
            # packaged tinyproxy user's privilege drop swallowing the log).
            echo "User $puser"
            echo "Group $pgroup"
            echo 'LogFile "/tmp/tinyproxy.log"'
            echo 'PidFile "/tmp/tinyproxy.pid"'
            echo "LogLevel Connect"
            echo "ConnectPort 443"
          } > /tmp/tinyproxy.conf
          tinyproxy -c /tmp/tinyproxy.conf
          ok=
          for _ in $(seq 1 10); do
            if curl -fsS -x http://127.0.0.1:8888 -o /dev/null https://github.com; then ok=1; break; fi
            sleep 1
          done
          [ -n "$ok" ] || { echo "::error::tinyproxy did not come up"; cat /tmp/tinyproxy.log 2>/dev/null || true; exit 1; }
          # Confirm our instance (not a leftover service) owns the port and logs.
          test -f /tmp/tinyproxy.log || { echo "::error::tinyproxy is not logging to /tmp/tinyproxy.log"; exit 1; }

      - name: Run setup-task through the proxy
        uses: ./
        env:
          HTTP_PROXY: http://127.0.0.1:8888
          HTTPS_PROXY: http://127.0.0.1:8888
        with:
          # A range + check-latest forces version resolution via the GitHub API,
          # which only the built-in fetch reaches (tool-cache already proxies and
          # only hits github.com / the asset CDN) — so this exercises the new
          # fetch proxying. check-latest avoids a cache hit short-circuiting the
          # API call and making the api.github.com assertion below vacuous.
          version: "3.x"
          check-latest: "true"
          repo-token: ${{ github.token }}
      - run: task --version

      - name: Assert the built-in fetch went through the proxy
        run: |
          echo '--- tinyproxy log ---'
          cat /tmp/tinyproxy.log || true
          # api.github.com is reached ONLY by the action's fetch (version
          # resolution) — never by tool-cache or the readiness curl above. Its
          # presence proves configureProxyFromEnv() routed fetch through the proxy;
          # if fetch bypassed it (direct egress), this is absent and the job fails.
          grep -Eiq "api\.github\.com" /tmp/tinyproxy.log

  # Bridge job that always succeeds so branch protection can require it even
  # when the real self-test jobs are skipped for markdown-only changes.
  self-test-gate:
    name: Self-test (gate)
    needs: [changes, matrix, skip-checksum, proxy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        run: |
          changes="${{ needs.changes.result }}"
          matrix="${{ needs.matrix.result }}"
          skip="${{ needs.skip-checksum.result }}"
          proxy="${{ needs.proxy.result }}"
          if [ "$changes" == "failure" ] || [ "$matrix" == "failure" ] || [ "$skip" == "failure" ] || [ "$proxy" == "failure" ]; then
            echo "::error::Self-test failed (changes=$changes, matrix=$matrix, skip-checksum=$skip, proxy=$proxy)"
            exit 1
          fi
          if [ "$changes" == "cancelled" ] || [ "$matrix" == "cancelled" ] || [ "$skip" == "cancelled" ] || [ "$proxy" == "cancelled" ]; then
            echo "::error::Self-test was cancelled (changes=$changes, matrix=$matrix, skip-checksum=$skip, proxy=$proxy)"
            exit 1
          fi
          echo "Self-test passed or skipped (markdown-only changes)."
