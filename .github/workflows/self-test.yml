name: Self-test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  matrix:
    name: ${{ matrix.os }} / version=${{ matrix.version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        version: ["latest", "3.x", "3.51.1"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The action runs from dist/, so build it first in CI.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run setup-task (first install — expect cache miss)
        id: setup
        uses: ./
        with:
          version: ${{ matrix.version }}

      - name: Verify install and cache miss on first run
        shell: bash
        run: |
          installed="$(task --version)"
          echo "task --version => ${installed}"
          echo "resolved => ${RESOLVED} / cache-hit => ${CACHE_HIT}"
          case "${installed}" in
            *"${RESOLVED}"*) echo "OK: versions match" ;;
            *) echo "::error::version mismatch: '${installed}' does not contain '${RESOLVED}'"; exit 1 ;;
          esac
          if [ "${CACHE_HIT}" != "false" ]; then
            echo "::error::expected cache-hit=false on the first install, got '${CACHE_HIT}'"; exit 1
          fi
        env:
          RESOLVED: ${{ steps.setup.outputs.version }}
          CACHE_HIT: ${{ steps.setup.outputs.cache-hit }}

      # Re-run in the same job: the tool cache persists on this runner, so the
      # second install must be a cache hit (download + checksum skipped). This
      # verifies the cache-hit path required by 要求仕様書 §10.2.
      - name: Run setup-task again (expect cache hit)
        id: setup2
        uses: ./
        with:
          version: ${{ matrix.version }}

      - name: Verify cache hit on second run
        shell: bash
        run: |
          echo "resolved => ${RESOLVED} / cache-hit => ${CACHE_HIT}"
          if [ "${CACHE_HIT}" != "true" ]; then
            echo "::error::expected cache-hit=true on the second install, got '${CACHE_HIT}'"; exit 1
          fi
          if [ "${RESOLVED}" != "${FIRST}" ]; then
            echo "::error::resolved version changed between runs: '${FIRST}' -> '${RESOLVED}'"; exit 1
          fi
          echo "OK: second install was served from the tool cache"
        env:
          RESOLVED: ${{ steps.setup2.outputs.version }}
          CACHE_HIT: ${{ steps.setup2.outputs.cache-hit }}
          FIRST: ${{ steps.setup.outputs.version }}

  skip-checksum:
    name: Install with skip-checksum
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # skip-checksum bypasses SHA256 verification and must still install.
      # (Checksum verification with mismatch detection is covered by the matrix
      # job above — which installs with verification on — and by the tamper
      # tests in tests/checksum.test.ts, run by the CI test job.)
      - name: Install with checksum skipped
        uses: ./
        with:
          version: "3.51.1"
          skip-checksum: "true"
      - run: task --version
