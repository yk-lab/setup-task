name: Release

# Manual release: build dist/ (kept out of main) and bake it onto the release
# tag, then move the v<major> / v<major>.<minor> moving tags. See RELEASING.md.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish, with the leading v (e.g. v1.0.0). The moving tags v1 / v1.0 are updated automatically."
        required: true
        type: string

permissions:
  contents: read

# Never run two releases at once; do not cancel an in-flight one.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, tag & publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the release + tag, force-update the moving tags
    outputs:
      major: ${{ steps.meta.outputs.major }}
    steps:
      # Releases must be cut from main; workflow_dispatch can otherwise be run
      # from any branch, which would tag/publish unreviewed code.
      - name: Guard — release only from main
        if: ${{ github.ref_name != 'main' }}
        env:
          REF: ${{ github.ref_name }}
        run: |
          echo "::error::Release must be run from main; got '$REF'."
          exit 1

      # Fail fast on a malformed tag before we create anything, and derive the
      # v<major> moving tag. Pre-release tags are rejected on purpose: this
      # workflow always advances the stable v1 / v1.0 moving tags, which must
      # never be dragged onto an rc/beta build.
      - name: Validate version & derive major tag
        id: meta
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be a stable release tag like v1.2.3 (no pre-release suffix); got '$VERSION'"
            exit 1
          fi
          echo "major=${VERSION%%.*}" >> "$GITHUB_OUTPUT" # v1.2.3 -> v1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # tags/release are written via the API, not git push

      # pnpm must be set up before setup-node so `cache: pnpm` can find it.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Reproducible bundle with the pinned pnpm/Node. dist/ is baked into the
      # tag below (see build-and-tag-action), never committed to main.
      - run: pnpm run build

      # Create the tag at the current commit. build-and-tag-action then
      # fast-forwards it onto a commit that carries the built dist/ — a
      # fast-forward, so the tag-protection ruleset (non_fast_forward on v*.*.*)
      # permits it. The Release is published only after that (see below), so a
      # failed bake never leaves a published release pointing at dist-less code.
      - name: Create the release tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          # Idempotent: a prior failed run may have left this tag behind, and it is
          # protected against deletion, so it can't be cleaned up without admin
          # bypass. Re-running the workflow is the recovery path — the bake step
          # below fast-forwards the existing tag onto the freshly built commit.
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists; the bake step will fast-forward it."
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f "ref=refs/tags/$VERSION" \
              -f "sha=$GITHUB_SHA"
          fi

      # Commit action.yml + dist/index.js onto the tag and force-update the
      # moving v<major> / v<major>.<minor> tags to match (those are outside the
      # ruleset's v*.*.* pattern, so the non-fast-forward moves are allowed).
      - name: Bake dist into the tag & move v1 / v1.0
        uses: JasonEtco/build-and-tag-action@dd5e4991048c325f6d85b4155e586fc211c644da # v2.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ inputs.version }}

      # Publish the Release last, on the now-baked tag, with auto-generated notes.
      # Idempotent so a rerun after a publish hiccup doesn't fail on an existing one.
      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists; leaving it in place."
          else
            gh release create "$VERSION" --title "$VERSION" --generate-notes --verify-tag
          fi

      - name: Job summary
        env:
          VERSION: ${{ inputs.version }}
          MAJOR: ${{ steps.meta.outputs.major }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "### Released \`$VERSION\` :rocket:"
            echo ""
            echo "- Release: https://github.com/$REPO/releases/tag/$VERSION"
            echo "- Moving tag \`$MAJOR\` now points at this release."
            echo "- Consume with \`uses: $REPO@$MAJOR\`."
          } >> "$GITHUB_STEP_SUMMARY"

  # Smoke test: check out the moving major tag exactly as a consumer's
  # `uses: <repo>@v1` would resolve it, and confirm the action is packaged
  # (action.yml + a parseable dist/index.js). The action's runtime behaviour is
  # covered separately by self-test.yml; this guards the packaging step.
  verify-published-tag:
    name: Verify the published tag is consumable
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out the moving major tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.major }}
          persist-credentials: false

      - name: Assert the action is packaged on the tag
        env:
          MAJOR: ${{ needs.release.outputs.major }}
        run: |
          test -f action.yml || { echo "::error::action.yml missing on tag $MAJOR"; exit 1; }
          test -f dist/index.js || { echo "::error::dist/index.js missing on tag $MAJOR"; exit 1; }
          node --check dist/index.js
          echo "Packaged OK on $MAJOR: action.yml + dist/index.js present and dist parses."
