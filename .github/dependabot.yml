version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Let a release age before Dependabot proposes it (supply-chain cooldown,
    # mirrors pnpm's minimumReleaseAge).
    cooldown:
      default-days: 7
    groups:
      actions-toolkit:
        patterns:
          - "@actions/*"
      # vitest core and its plugins peer-depend on each other with an exact
      # version pin (@vitest/coverage-v8 needs the matching vitest), so they must
      # bump in lockstep — one grouped PR instead of separate ones that can merge
      # out of sync and break the peer requirement.
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
    ignore:
      # @types/node must track the Node runtime (Node 24); bump its major
      # manually when the runtime moves. Stops overshooting proposals (e.g. v26).
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
