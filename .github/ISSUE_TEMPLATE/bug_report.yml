name: Bug report
description: Report a problem installing or running Task via this action
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please do **not** report security vulnerabilities here —
        see the [security policy](https://github.com/yk-lab/setup-task/security/policy).
  - type: input
    id: action-version
    attributes:
      label: setup-task version
      description: e.g. v1 / v1.0.0 / a commit SHA
      placeholder: "v1"
    validations:
      required: true
  - type: input
    id: task-version
    attributes:
      label: Requested `version` input
      description: The value you passed to the `version` input.
      placeholder: "latest / 3.x / 3.51.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Runner OS
      options:
        - ubuntu-latest
        - macos-latest
        - windows-latest
        - self-hosted (describe below)
    validations:
      required: true
  - type: input
    id: arch
    attributes:
      label: Runner architecture
      placeholder: "amd64 / arm64 / riscv64 / ..."
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Action logs
      description: Relevant step output (enable step debug logging if possible). Redact any secrets.
      render: shell
    validations:
      required: false
  - type: textarea
    id: workflow
    attributes:
      label: Workflow snippet
      description: The relevant `uses: yk-lab/setup-task@...` step.
      render: yaml
    validations:
      required: false
